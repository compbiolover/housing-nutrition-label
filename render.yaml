# Render Blueprint for the Housing Nutrition Label API.
# Docs: https://render.com/docs/blueprint-spec
# Deploy: push this repo, then "New + → Blueprint" and select it.
# Set CENSUS_API_KEY / WALKSCORE_API_KEY in the dashboard for the full 8
# dimensions (they're marked sync:false so they aren't stored in the repo).
services:
  - type: web
    name: housing-label-api
    runtime: python
    plan: free
    buildCommand: pip install -e ".[api]"
    startCommand: housing-api          # reads $PORT, injected by Render
    healthCheckPath: /healthz
    autoDeploy: false
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://housinglabel.dev
      # Keep the glibc allocator from hoarding freed memory. A pandas/numpy request
      # path allocates and frees many short-lived buffers; by default glibc keeps
      # them in per-thread arenas and rarely returns them to the OS, so RSS ratchets
      # upward for days until the instance OOMs. Capping arenas and lowering the
      # trim threshold makes freed memory actually go back — flattening the climb.
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: MALLOC_TRIM_THRESHOLD_
        value: "65536"
      # Per-IP rate limit on the scoring endpoints (protects the keyed/free
      # upstreams they proxy). "" or "0" disables it; /healthz is always exempt.
      - key: RATE_LIMIT
        value: "30/minute"
      - key: CENSUS_API_KEY
        sync: false
      - key: WALKSCORE_API_KEY
        sync: false
