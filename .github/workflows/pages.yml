name: Deploy Pages

# Publishes docs/ to GitHub Pages (housinglabel.dev) via the "GitHub Actions"
# source. The concurrency group serializes deployments so rapid successive merges
# to main queue instead of racing — the classic "Deploy from a branch" flow has no
# concurrency control, which caused intermittent "Deployment failed, try again
# later." errors when a newer push superseded an in-flight deploy. The artifact is
# served as-is (no Jekyll build; see docs/.nojekyll).
#
# Requires repo setting: Settings -> Pages -> Build and deployment -> Source ->
# "GitHub Actions" (the deploy step errors until that is set).

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:      # manual redeploy / retry

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false   # let an in-flight deploy finish; queue the next

jobs:
  deploy:
    # workflow_dispatch can target any branch. Publish only from main: a dispatch
    # started on any other branch skips this job entirely (deploys nothing), so a
    # non-main tree can never reach the github-pages environment / custom domain.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
