name: PR title (Conventional Commits)

# With squash merges, the PR title becomes the commit message on main — which is
# what release-please parses for versioning + the changelog. This lints the title
# so the history (and releases) stay clean without per-commit discipline.
# Requires repo setting: Pull Requests → "Default to PR title for squash merge commits".

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read
  statuses: write

jobs:
  lint-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50  # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed Conventional Commit types. feat → minor (pre-1.0: patch);
          # fix → patch; feat!/BREAKING CHANGE → minor (pre-1.0). Others are
          # changelog-only (no release on their own).
          types: |
            feat
            fix
            docs
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          # Disallow a capital first letter (avoid Sentence-case subjects).
          # Digits/symbols are allowed (e.g. "fix: 2x faster …"), so the message
          # matches what the regex actually enforces.
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must not start with an uppercase letter
            (keep it lowercase, Conventional Commits style).
