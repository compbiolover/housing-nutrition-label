name: CI

# Runs the test suite and the linter on every push and pull request. Until now
# the ~160 tests were only ever run by hand (CONTRIBUTING documents a local
# loop), so a scoring regression could reach main — and the release PR —
# undetected. Installing the [api,dev] extras means the FastAPI-guarded API
# tests actually run (they self-skip when FastAPI is absent) rather than being
# silently skipped. Actions are SHA-pinned (Dependabot keeps them current) to
# match the pages.yml / release-please convention.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  # Cancel superseded runs on the same ref (a new push to a PR) to save minutes.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor and a current release — matches requires-python = ">=3.10".
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (with API + dev extras)
        run: pip install -e ".[api,dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: README in sync with code (dimension roster)
        run: python scripts/sync_readme.py --check
      - name: Docs site in sync with code (Setup / Reference pages)
        run: python scripts/sync_docs.py --check
      - name: Test (pytest)
        run: pytest -q
